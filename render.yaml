services:
  # ── Web service ───────────────────────────────────────────────────────────
  - type: web
    name: finance-tracker-api
    runtime: python
    buildCommand: pip install -r requirements.txt && python setup_db.py
    startCommand: gunicorn run:app
    plan: free
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SECRET_KEY
        generateValue: true          # Render generates a random value
      - key: DATABASE_URL
        fromDatabase:
          name: finance-tracker-db
          property: connectionString
      - key: CACHE_TIMEOUT
        value: "300"
      - key: RATELIMIT_DEFAULT
        value: "100 per minute"

  # ── PostgreSQL database ───────────────────────────────────────────────────
databases:
  - name: finance-tracker-db
    databaseName: finance_tracker
    plan: free
